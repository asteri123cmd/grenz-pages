<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 180 180" width="180" height="180">
  <defs>
    <radialGradient id="bg" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#0f1a10"></stop>
      <stop offset="100%" stop-color="#04090a"></stop>
    </radialGradient>
    <filter id="glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="4" result="blur"></feGaussianBlur>
      <feMerge>
        <feMergeNode in="blur"></feMergeNode>
        <feMergeNode in="SourceGraphic"></feMergeNode>
      </feMerge>
    </filter>
  </defs>
  <rect width="180" height="180" rx="38" fill="url(#bg)"></rect>
  <rect x="6" y="6" width="168" height="168" rx="34" fill="none" stroke="#7fff00" stroke-width="2.5" opacity=".5"></rect>
  <g filter="url(#glow)">
    <polygon points="98 24 46 100 86 100 76 156 134 74 94 74 98 24" fill="#7fff00"></polygon>
  </g>
</svg>