<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64">
  <defs>
    <radialGradient id="bg" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#0f1a10"></stop>
      <stop offset="100%" stop-color="#04090a"></stop>
    </radialGradient>
    <filter id="glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="1.6" result="blur"></feGaussianBlur>
      <feMerge>
        <feMergeNode in="blur"></feMergeNode>
        <feMergeNode in="SourceGraphic"></feMergeNode>
      </feMerge>
    </filter>
  </defs>
  <rect width="64" height="64" rx="14" fill="url(#bg)"></rect>
  <rect x="2" y="2" width="60" height="60" rx="13" fill="none" stroke="#7fff00" stroke-width="1.2" opacity=".4"></rect>
  <g filter="url(#glow)">
    <polygon points="35 8 16 36 31 36 27 56 48 26 33 26 35 8" fill="#7fff00"></polygon>
  </g>
</svg>